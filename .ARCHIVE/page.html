<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rainbow Glow Button</title>
  <style>
    /* General Styles */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #1e1e2e;
    }

    .rainbow-button {
      position: relative;
      padding: 15px 30px;
      font-size: 18px;
      color: #fff;
      border: 1px solid #fff;
      border-radius: 30px;
      background: #1e1e2e;
      cursor: pointer;
      overflow: hidden;
      transition: color 0.5s ease, background-color 0.5s ease;
      z-index: 1;
      height: 300px;
      width: 300px;
    }

    .rainbow-button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 300%;
      height: 300%;
      background: linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet, red);
      z-index: -1;
      transform: translate(-50%, -50%) scale(0);
      filter: blur(50px);
      opacity: 0;
      border-radius: 50%;
      transition: transform 0.5s ease, opacity 0.5s ease;
    }

    .rainbow-button:hover::before {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      animation: rotate-glow 3s linear infinite;
    }

    .rainbow-button:hover {
      color: #fff;
      background: #1e1e2e;
    }

    /* Glow Rotation Animation */
    @keyframes rotate-glow {
      0% {
        transform: translate(-50%, -50%) rotate(0deg);
      }
      100% {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <button style="font-family: 'Inter', sans-serif" class="rainbow-button">Click Me</button>
</body>
</html>
