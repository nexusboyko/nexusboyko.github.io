<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog - Alex Boyko</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.ico">

  <!-- TinyMCE -->
  <script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
</head>
<body>
  <div class="container blog-page">
    <a href="index.html" class="back-link">← Home</a>

    <header class="blog-header">
      <h1>Blog</h1>
    </header>

    <div id="posts-container">
      <p style="text-align: center; color: #999;">Loading posts...</p>
    </div>

    <!-- Admin panel (Ctrl+Shift+B) -->
    <div id="admin-panel" style="display: none;">
      <form id="admin-form" class="admin-form" enctype="multipart/form-data">
        <h2>New Post</h2>
        <input type="text" id="title" placeholder="Title" required>
        <textarea id="editor"></textarea>
        <input type="file" id="image" accept="image/*">
        <div style="margin-top: 1rem;">
          <button type="submit">Publish</button>
          <button type="button" id="cancel-btn" style="background: #999;">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="blog-client.js"></script>
</body>
</html>
