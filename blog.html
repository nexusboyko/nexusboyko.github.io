<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog — Alex Boyko</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.ico">
</head>
<body>
  <nav><a href="index.html">← Home</a></nav>

  <header>
    <h1>Blog</h1>
  </header>

  <div id="posts"></div>

  <!-- Admin panel (Ctrl+Shift+B) -->
  <div id="admin" style="display:none;">
    <h2>New Post</h2>
    <form id="post-form">
      <p><input type="text" id="title" placeholder="Title" required style="width:100%;padding:0.5rem;border:1px solid #ddd;font-family:inherit;"></p>
      <p><textarea id="content" placeholder="Content (HTML allowed)" required style="width:100%;min-height:200px;padding:0.5rem;border:1px solid #ddd;font-family:inherit;"></textarea></p>
      <p><input type="file" id="image" accept="image/*"></p>
      <button type="submit" style="padding:0.5rem 1rem;background:#4a90e2;color:white;border:none;cursor:pointer;">Publish</button>
      <button type="button" id="cancel" style="padding:0.5rem 1rem;background:#999;color:white;border:none;cursor:pointer;margin-left:0.5rem;">Cancel</button>
    </form>
  </div>

  <script src="blog-client.js"></script>
</body>
</html>
